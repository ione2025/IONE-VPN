# Coturn STUN/TURN configuration for IONE VPN
# Open-source: https://github.com/coturn/coturn
#
# Purpose: relay fallback for VPN clients behind strict NAT (CGNAT, symmetric NAT)
# that cannot establish a direct WireGuard UDP connection to the VPN server.
#
# Usage with WireGuard: the Flutter client tries direct UDP first; if handshake
# fails after 10s it connects via the TURN relay (same approach as Netbird).

# Listening ports
listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=65535

# Bind to all interfaces (host network mode in Docker)
listening-ip=0.0.0.0

# External IP – set to your droplet public IP
# This is injected from TURN_EXTERNAL_IP env var in the wrapper script.
# Uncomment and set manually if env injection does not work:
# external-ip=YOUR_DROPLET_IP

# Authentication (long-term credentials)
lt-cred-mech
user=${TURN_USERNAME:-ionevpn}:${TURN_PASSWORD:-changeme}
realm=ionevpn.com

# Security
no-multicast-peers
no-loopback-peers
# Allow only TURN relay (block STUN discovery of internal IPs)
no-software-attribute
fingerprint

# TLS – point to Let's Encrypt certs (generated by certbot)
# Uncomment when certs are available:
# cert=/etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
# pkey=/etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem

# Logging
log-file=/var/log/coturn/turn.log
verbose
