# ─── Nginx reverse-proxy config for IONE VPN API ─────────────────────────────
# Deploy: sed -i 's/YOUR_DOMAIN_OR_IP/129.212.208.167/' /etc/nginx/sites-available/ione-vpn
# then:   ln -sf /etc/nginx/sites-available/ione-vpn /etc/nginx/sites-enabled/ione-vpn
#         rm -f /etc/nginx/sites-enabled/default
#         nginx -t && systemctl reload nginx
#
# NOTE: gzip and upstream keepalive are configured in /etc/nginx/nginx.conf http{} block.
# See deploy instructions below for the sed commands that patch nginx.conf.

# ── Upstream pool ─────────────────────────────────────────────────────────────
upstream ione_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff          always;
    add_header X-Frame-Options         DENY             always;
    add_header Referrer-Policy         no-referrer      always;

    # ── Buffer / timeout tuning ───────────────────────────────────────────────
    client_max_body_size    10k;        # matches Express 10kb body limit
    client_body_buffer_size 10k;
    proxy_buffer_size       8k;
    proxy_buffers           8 8k;
    proxy_busy_buffers_size 16k;
    proxy_connect_timeout   5s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass             http://ione_api;
        proxy_http_version     1.1;
        proxy_set_header       Connection        "";   # enable keepalive to upstream
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
    }

    # ── Speedtest file (large random payload, client downloads to measure BW) ──
    # Create: dd if=/dev/urandom of=/var/www/speedtest/10mb.bin bs=1M count=10
    location /speedtest/ {
        alias               /var/www/speedtest/;
        add_header          Cache-Control no-store;
        sendfile            on;
        tcp_nopush          on;
    }

    # ── Health check (no logging to keep logs clean) ──────────────────────────
    location = /health {
        proxy_pass         http://ione_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        access_log         off;
    }
}

