# ─── Nginx reverse-proxy config for IONE VPN API ─────────────────────────────
# Place this file at /etc/nginx/sites-available/ione-vpn
# then: ln -s /etc/nginx/sites-available/ione-vpn /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Redirect HTTP → HTTPS (uncomment after obtaining TLS cert)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Speed-test file endpoint (large file for bandwidth test)
    location /speedtest {
        alias /var/www/speedtest/;
        add_header Cache-Control no-store;
    }
}

