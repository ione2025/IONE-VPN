name: ione_vpn
description: IONE VPN – Secure, fast, cross-platform VPN client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP & API
  dio: ^5.4.3

  # Secure storage (tokens, config)
  flutter_secure_storage: ^10.0.0

  # WireGuard / VPN tunnel
  wireguard_flutter_plus: 1.0.3

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  fl_chart: ^1.1.1        # speed/data charts
  shimmer: ^3.0.0

  # Utilities
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.0.0
  url_launcher: ^6.2.5
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
